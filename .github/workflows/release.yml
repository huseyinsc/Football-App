name: Semantic Release

on:
    push:
        branches:
            - master

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install semantic-release and plugins
              run: |
                  npm install -g \
                    semantic-release \
                    @semantic-release/commit-analyzer \
                    @semantic-release/release-notes-generator \
                    @semantic-release/changelog \
                    @semantic-release/exec \
                    @semantic-release/git

            - name: Run Semantic Release
              id: semantic
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                    # Semantic Release çıktısını yakala
                    npx semantic-release || true
                
                    # Son tag'i al
                    LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                    if [ -n "$LATEST_TAG" ]; then
                        echo "next_version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT
                        echo "has_release=true" >> $GITHUB_OUTPUT
                    else
                        echo "has_release=false" >> $GITHUB_OUTPUT
                    fi

            - name: Create GitHub Release
              if: steps.semantic.outputs.has_release == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                  VERSION="v${{ steps.semantic.outputs.next_version }}"
                  # GitHub release zaten var mı kontrol et
                  if ! gh release view "$VERSION" &>/dev/null; then
                      gh release create "$VERSION" \
                          --title "$VERSION" \
                          --notes "Release $VERSION" \
                          --generate-notes
                  else
                      echo "Release $VERSION already exists"
                  fi
