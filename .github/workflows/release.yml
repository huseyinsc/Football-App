name: Semantic Release

on:
    push:
        branches:
            - master

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install semantic-release and plugins
              run: |
                  npm install -g \
                    semantic-release \
                    @semantic-release/commit-analyzer \
                    @semantic-release/release-notes-generator \
                    @semantic-release/changelog \
                    @semantic-release/exec \
                    @semantic-release/git

            - name: Run Semantic Release
              id: semantic
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                  npx semantic-release
                  echo "next_version=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              if: steps.semantic.outputs.next_version != ''
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                  VERSION="v${{ steps.semantic.outputs.next_version }}"
                  MAJOR=$(echo $VERSION | cut -d. -f1 | sed 's/^v//')
                  if [ "$MAJOR" -ge 1 ]; then
                      echo "Creating GitHub Release for $VERSION"
                      gh release create "$VERSION" \
                          --title "$VERSION" \
                          --notes "Release $VERSION" \
                          --generate-notes
                  else
                      echo "Version < 1.0.0. Tag created but GitHub release skipped."
                  fi
